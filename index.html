<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solventum Clinical Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #012A24 0%, #01332B 55%, #01422F 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: rgba(255,255,255,0.88);
    }

    /* ── Navbar ── */
    .navbar {
      height: 56px;
      background: #012A24;
      border-bottom: 1px solid rgba(5,221,77,0.18);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 12px;
      flex-shrink: 0;
    }
    .navbar-logo { width: 30px; height: 30px; border-radius: 7px; overflow: hidden; flex-shrink: 0; }
    .navbar-logo svg { width: 100%; height: 100%; }
    .navbar-brand { font-size: 18px; font-weight: 700; color: #ffffff; letter-spacing: -0.01em; }
    .navbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.12); margin: 0 4px; }
    .navbar-sub { font-size: 12px; font-weight: 600; color: #05DD4D; }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 24px 24px;
      gap: 72px;
    }

    .hero-logo {
      width: 72px; height: 72px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 8px 40px rgba(5,221,77,0.22);
    }
    .hero-logo svg { width: 100%; height: 100%; }

    .hero-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: #05DD4D; margin-bottom: 14px;
    }
    .hero-title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800; color: #05DD4D;
      line-height: 1.1; margin-bottom: 0;
      letter-spacing: -0.03em;
      display: flex; align-items: center; justify-content: flex-start;
      gap: 16px;
      width: 100%; max-width: 820px;
    }
    .hero-title-logo {
      width: clamp(36px, 5vw, 52px);
      height: clamp(36px, 5vw, 52px);
      flex-shrink: 0;
      margin-left: -4px;
    }
    .hero-title-logo svg { width: 100%; height: 100%; }
    .hero-subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 700;
      color: #ffffff;
      max-width: 520px; line-height: 1.7;
      margin-bottom: 40px;
    }

    /* ── Tool Cards ── */
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      width: 100%;
      max-width: 820px;
    }
    @media (min-width: 640px) {
      .cards { grid-template-columns: 1fr 1fr; }
    }

    .tool-card {
      background: rgba(1,66,47,0.55);
      border: 1px solid rgba(5,221,77,0.15);
      border-radius: 22px;
      padding: 32px 28px 26px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .tool-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 85% 15%, rgba(5,221,77,0.07), transparent 60%);
      pointer-events: none;
    }
    .tool-card:hover {
      transform: translateY(-5px);
      background: rgba(1,66,47,0.8);
      box-shadow: 0 16px 48px rgba(0,0,0,0.32);
    }

    /* Card accent variants using official palette */
    .tool-card.calc-card {
      border-color: rgba(25,165,145,0.7);
      background: rgba(0,40,48,0.7);
      box-shadow: 0 0 0 1px rgba(25,165,145,0.15) inset;
    }
    .tool-card.calc-card::before {
      background: radial-gradient(circle at 85% 15%, rgba(25,165,145,0.18), transparent 60%);
    }
    .tool-card.calc-card:hover { border-color: #19A591; box-shadow: 0 16px 48px rgba(25,165,145,0.2); }

    .tool-card.app-card {
      border-color: rgba(28,207,147,0.6);
      background: rgba(0,36,44,0.7);
      box-shadow: 0 0 0 1px rgba(28,207,147,0.1) inset;
    }
    .tool-card.app-card::before {
      background: radial-gradient(circle at 85% 15%, rgba(28,207,147,0.14), transparent 60%);
    }
    .tool-card.app-card:hover { border-color: #1CCF93; box-shadow: 0 16px 48px rgba(28,207,147,0.2); }

    .tool-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 3px 10px;
      width: fit-content;
    }
    .tool-card.featured .tool-badge {
      color: #05DD4D;
      background: rgba(5,221,77,0.1);
      border-color: rgba(5,221,77,0.3);
    }

    .tool-name {
      font-size: 1.25rem; font-weight: 700;
      color: #ffffff; line-height: 1.2;
    }
    .tool-tagline {
      font-size: 0.78rem; font-weight: 600;
      color: #05DD4D; margin-top: -4px;
    }
    .tool-card:not(.featured) .tool-tagline { color: #05DD4D; }

    .tool-desc {
      font-size: 0.82rem; color: rgba(255,255,255,0.45);
      line-height: 1.65; flex: 1;
    }

    .tool-features {
      display: flex; flex-direction: column; gap: 6px;
      margin-top: 2px;
    }
    .tool-feature {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; color: rgba(255,255,255,0.5);
    }
    .tool-feature::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(5,221,77,0.5);
      flex-shrink: 0;
    }
    .tool-card.featured .tool-feature { color: rgba(255,255,255,0.65); }
    .tool-card.featured .tool-feature::before { background: #05DD4D; }

    .tool-divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 4px 0;
    }

    .tool-cta {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; font-weight: 600;
      color: rgba(255,255,255,0.85);
      transition: gap 0.15s;
    }
    .tool-card.calc-card .tool-cta { color: #19A591; }
    .tool-card.app-card  .tool-cta { color: #1CCF93; }
    .tool-card:hover .tool-cta { gap: 11px; }

    .tool-note {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      margin-top: -6px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <rect width="150" height="150" rx="28" fill="#00262A"/>
        <path d="M70.89,34.04c0-9.29-6.69-15.2-16.17-15.2s-16.7,6.83-16.7,16.89,7.22,17.08,19.29,17.08h20.4c28.77,0,47.49,19.49,47.49,44.89s-19.29,44.89-45.66,44.89-45.66-18.57-45.66-44.17c0-9.29,3.18-19.1,7.99-26.37h10.97c-5.58,7.22-8.52,16.31-8.52,25.6,0,20.21,14.67,35.27,35.27,35.27s35.27-15.01,35.27-35.27-14.67-35.27-37.1-35.27h-20.21c-20.26,.05-29.73-12.03-29.73-26.66s12.08-26.37,26.9-26.37c16.31,0,26.37,10.97,26.37,23.77,0,1.54-.19,3.61-.67,5h-10.1c.34-1.11,.58-2.98,.58-4.09Z" fill="#05DD4D"/>
      </svg>
    </div>
    <span class="navbar-brand">Solventum</span>
    <div class="navbar-divider"></div>
    <span class="navbar-sub">Clinical Hub</span>
  </nav>

  <main class="hero">

    <h1 class="hero-title">
      <div class="hero-title-logo">
        <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
          <path d="M70.89,34.04c0-9.29-6.69-15.2-16.17-15.2s-16.7,6.83-16.7,16.89,7.22,17.08,19.29,17.08h20.4c28.77,0,47.49,19.49,47.49,44.89s-19.29,44.89-45.66,44.89-45.66-18.57-45.66-44.17c0-9.29,3.18-19.1,7.99-26.37h10.97c-5.58,7.22-8.52,16.31-8.52,25.6,0,20.21,14.67,35.27,35.27,35.27s35.27-15.01,35.27-35.27-14.67-35.27-37.1-35.27h-20.21c-20.26,.05-29.73-12.03-29.73-26.66s12.08-26.37,26.9-26.37c16.31,0,26.37,10.97,26.37,23.77,0,1.54-.19,3.61-.67,5h-10.1c.34-1.11,.58-2.98,.58-4.09Z" fill="#05DD4D"/>
        </svg>
      </div>
      <span style="color:#ffffff">Solventum.</span><span style="color:#05DD4D"> Hub</span>
    </h1>

    <div class="cards">

      <!-- Health Care Calculator -->
      <a class="tool-card calc-card" href="health-care-calculator-solventum.html">
        <span class="tool-badge" style="color:#19A591;background:rgba(25,165,145,0.1);border-color:rgba(25,165,145,0.3);">🦷 Calculator</span>
        <div class="tool-name">Health Care Calculator</div>
        <div class="tool-tagline" style="color:#19A591;">ROI · Bulk Fill · Fluoride · P&amp;L</div>
        <div class="tool-cta">
          Open calculator
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>

      <!-- Solventum App -->
      <a class="tool-card app-card" href="solventum-app.html">
        <span class="tool-badge" style="color:#1CCF93;background:rgba(28,207,147,0.1);border-color:rgba(28,207,147,0.3);">🦷 Application</span>
        <div class="tool-name">Solventum App</div>
        <div class="tool-tagline" style="color:#1CCF93;">Events · Chatbot · Tutorials</div>
        <div class="tool-cta">
          Open app
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>

    </div>
  </main>

  <footer class="footer">
    Solventum Clinical Hub · All tools for internal and educational use only.
  </footer>

</body>
</html>
